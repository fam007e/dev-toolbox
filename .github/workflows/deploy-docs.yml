name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'book.toml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mdBook
        run: |
          mkdir bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xzC bin
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Prepare docs
        run: |
          # Copy files and fix links (remove docs/ prefix because they are now in the docs folder)
          sed 's|docs/||g' README.md > docs/introduction.md
          cp CONTRIBUTING.md docs/CONTRIBUTING.md
          cp SECURITY.md docs/SECURITY.md
          cp CHANGELOG.md docs/CHANGELOG.md
          cp CODE_OF_CONDUCT.md docs/CODE_OF_CONDUCT.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with mdBook
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
